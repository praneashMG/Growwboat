<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boatify | SIGN UP</title>
    <link rel="icon" href="/assets/logo.jpeg" type="image/jpeg">

<script src="tailwind.js"></script>
    <style>
        :root,
        html[data-theme='light'] {
            --color-background: #F8FAFC;
            --color-surface: #FFFFFF;
            --color-primary-text: #1E293B;
            --color-secondary-text: #64748B;
            --color-border: #E2E8F0;
            --color-input-bg: #FFFFFF;
        }

        html[data-theme='dark'] {
            --color-background: #0F172A;
            --color-surface: #1E293B;
            --color-primary-text: #F8FAFC;
            --color-secondary-text: #94A3B8;
            --color-border: #334155;
            --color-input-bg: #0F172A;
        }

        body {
            background-color: var(--color-background);
            color: var(--color-primary-text);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 1rem;
        }

        .auth-card {
            background-color: var(--color-surface);
            border: 1px solid var(--color-border);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .input-field {
            background-color: var(--color-input-bg);
            border: 1px solid var(--color-border);
            color: var(--color-primary-text);
        }

        .btn-primary {
            background: linear-gradient(135deg, #0077B6 0%, #00B4D8 100%);
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-weight: 600;
        }

        p,
        label {
            font-weight: 400;
        }

        /* Floating Controls */
        .controls {
            position: fixed;
            top: 1rem;
            right: 1rem;
            display: flex;
            gap: 0.5rem;
            z-index: 50;
        }

        html[dir="rtl"] .controls {
            right: auto;
            left: 1rem;
        }

        .text-accent {
            color: #0077B6;
        }

        .btn-control {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--color-primary-text);
        }
    </style>
</head>

<body>

    <div class="controls">
        <button onclick="toggleRTL()" class="btn-control" title="Toggle RTL">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 3a9 9 0 100 18 9 9 0 000-18zm0 0c2.5 2.8 2.5 12.2 0 15m0-15c-2.5 2.8-2.5 12.2 0 15M3 12h18" />
            </svg>
        </button>
        <button onclick="toggleTheme()" class="btn-control" title="Toggle Dark Mode">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
        </button>
    </div>

    <div class="relative w-full max-w-4xl">
        <div class="auth-card w-full flex flex-col md:flex-row rounded-2xl h-auto overflow-hidden">
            <div class="hidden md:flex md:w-5/12 relative bg-slate-900">
                <img src="https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&q=80&w=2070"
                    class="absolute inset-0 w-full h-full object-cover opacity-50">
                <div class="relative z-10 p-8 text-white flex flex-col justify-between h-full">
                    <div>
                        <a href="index.html"
                            class="text-3xl font-serif font-extrabold tracking-tight mb-6 inline-block">
                            <span class="text-accent">Boatify</span><span class="text-[#48CAE4]">Wave</span>
                        </a>
                        <h2 class="text-3xl font-serif font-bold leading-tight mb-3">Sail Beyond <span
                                class="text-[#00B4D8]">the Horizon</span></h2>
                        <p class="text-gray-200 text-sm"> Discover premium yachts, exclusive destinations, and seamless
                            booking experiences.
                        </p>


                    </div>
                    <div class="bg-white/10 backdrop-blur-md p-4 rounded-xl border border-white/20">
                        <p class="italic text-xs">"The easiest way to book a luxury yacht."</p>
                    </div>
                </div>
            </div>

            <div class="w-full md:w-7/12 flex items-center justify-center p-5 lg:p-6">
                <div class="w-full max-w-sm">
                    <a href="index.html"
                        class="md:hidden text-3xl font-serif font-extrabold tracking-tight mb-6 text-center block">
                        <span class="text-accent">Boatify</span><span class="text-[#48CAE4]">Wave</span>
                    </a>

                    <div class="mb-6 text-center flex flex-col items-center">

                        <h3 class="text-3xl font-serif font-bold mb-2">
                            Create Account
                        </h3>

                        <p class="text-sm max-w-xs" style="color: var(--color-secondary-text)">
                            Join OceanWave today and explore the world's finest fleets.
                        </p>

                    </div>
                    <div class="flex justify-center gap-4 mb-5">
                        <button
                            class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center hover:opacity-80 transition shadow-sm input-field">
                            <svg class="w-4 h-4" viewBox="0 0 48 48">
                                <path fill="#EA4335"
                                    d="M24 9.5c3.2 0 6.1 1.1 8.3 3.1l6.2-6.2C34.8 2.4 29.7 0 24 0 14.6 0 6.6 5.5 2.7 13.4l7.3 5.7C11.9 13.1 17.4 9.5 24 9.5z" />
                                <path fill="#34A853"
                                    d="M46.1 24.5c0-1.7-.2-3.3-.5-4.9H24v9.3h12.4c-.5 2.9-2.1 5.4-4.5 7.1l6.9 5.4c4-3.7 6.3-9.1 6.3-16.9z" />
                                <path fill="#4A90E2"
                                    d="M10 28.7c-.5-1.4-.8-2.9-.8-4.4s.3-3 .8-4.4l-7.3-5.7C1 17.1 0 20.4 0 24s1 6.9 2.7 9.8l7.3-5.7z" />
                                <path fill="#FBBC05"
                                    d="M24 48c6.5 0 11.9-2.1 15.8-5.7l-6.9-5.4c-2 1.3-4.6 2.1-8.9 2.1-6.6 0-12.1-3.6-14.1-8.6l-7.3 5.7C6.6 42.5 14.6 48 24 48z" />
                            </svg>
                        </button>
                        <button
                            class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center hover:opacity-80 transition shadow-sm input-field">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                                <path
                                    d="M17.05 20.28c-.98.95-2.05.8-3.09.36-1.1-.46-2.11-.48-3.27 0-1.46.63-2.23.45-3.09-.36C3.25 15.97 3.91 9.48 8.2 9.23c1.24.07 2.1.68 2.83.73.73-.05 1.76-.76 3.13-.64 1.64.14 2.88.78 3.7 2.22-3.29 1.98-2.52 6.32.59 7.74-.6 1.33-1.34 2.6-2.4 3zM12.03 7.94c-.15-2.02 1.5-3.67 3.37-3.94.26 2.18-1.65 3.95-3.37 3.94z" />
                            </svg>
                        </button>
                        <button
                            class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center hover:opacity-80 transition shadow-sm input-field">
                            <svg class="w-4 h-4 text-[#1877F2]" fill="currentColor" viewBox="0 0 24 24">
                                <path
                                    d="M22 12a10 10 0 10-11.5 9.88v-7H8v-2.88h2.5V9.5c0-2.46 1.47-3.82 3.72-3.82 1.08 0 2.2.2 2.2.2v2.4h-1.24c-1.22 0-1.6.76-1.6 1.54v1.85H16l-.4 2.88h-2.18v7A10 10 0 0022 12z" />
                            </svg>
                        </button>
                    </div>

                    <div class="flex items-center gap-3 mb-5">
                        <div class="flex-1 h-px bg-gray-200 opacity-30"></div>
                        <span class="text-[10px] font-bold uppercase"
                            style="color: var(--color-secondary-text)">OR</span>
                        <div class="flex-1 h-px bg-gray-200 opacity-30"></div>
                    </div>

                    <form action="#" class="space-y-3">
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label
                                    class="block text-[10px] font-bold uppercase tracking-widest mb-1 opacity-70">First
                                    Name</label>
                                <input type="text" required
                                    class="input-field w-full px-4 py-2.5 rounded-xl text-sm outline-none focus:ring-1 focus:ring-[#0077B6]"
                                    placeholder="John">
                            </div>
                            <div>
                                <label
                                    class="block text-[10px] font-bold uppercase tracking-widest mb-1 opacity-70">Last
                                    Name</label>
                                <input type="text" required
                                    class="input-field w-full px-4 py-2.5 rounded-xl text-sm outline-none focus:ring-1 focus:ring-[#0077B6]"
                                    placeholder="Doe">
                            </div>
                        </div>

                        <div>
                            <label class="block text-[10px] font-bold uppercase tracking-widest mb-1 opacity-70">Email
                                Address</label>
                            <input type="email" required
                                class="input-field w-full px-4 py-2.5 rounded-xl text-sm outline-none focus:ring-1 focus:ring-[#0077B6]"
                                placeholder="email@example.com">
                        </div>

                        <div>
                            <label
                                class="block text-[10px] font-bold uppercase tracking-widest mb-1 opacity-70">Password</label>
                            <div class="relative">
                                <input type="password" required id="password"
                                    class="input-field w-full px-4 py-2.5 rounded-xl text-sm outline-none focus:ring-1 focus:ring-[#0077B6] pr-10"
                                    placeholder="••••••••">
                                <button type="button" onclick="togglePasswordVisibility('password', this)"
                                    class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                                    <svg class="w-5 h-5 eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                    </svg>
                                    <svg class="w-5 h-5 eye-slash-icon hidden" fill="none" stroke="currentColor"
                                        viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold uppercase tracking-widest mb-1 opacity-70">Confirm
                                Password</label>
                            <div class="relative">
                                <input type="password" required id="confirm_password"
                                    class="input-field w-full px-4 py-2.5 rounded-xl text-sm outline-none focus:ring-1 focus:ring-[#0077B6] pr-10"
                                    placeholder="••••••••">
                                <button type="button" onclick="togglePasswordVisibility('confirm_password', this)"
                                    class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                                    <svg class="w-5 h-5 eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                    </svg>
                                    <svg class="w-5 h-5 eye-slash-icon hidden" fill="none" stroke="currentColor"
                                        viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="flex items-center gap-2 pt-1">
                            <input type="checkbox" required id="terms" class="w-3.5 h-3.5 rounded border-gray-300">
                            <label for="terms" class="text-[10px] font-bold uppercase opacity-60 cursor-pointer">I agree
                                to Terms & Conditions</label>
                        </div>

                        <button type="submit"
                            class="btn-primary w-full py-3.5 rounded-xl text-white font-bold text-sm shadow-md mt-2 hover:brightness-110 transition">
                            Create Account
                        </button>
                    </form>

                    <p class="text-xs mt-6 text-center" style="color: var(--color-secondary-text)">
                        Already have an account? <a href="login.html"
                            class="text-[#0077B6] font-bold hover:underline">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePasswordVisibility(inputId, buttonEl) {
            const input = document.getElementById(inputId);
            const eyeIcon = buttonEl.querySelector('.eye-icon');
            const eyeSlashIcon = buttonEl.querySelector('.eye-slash-icon');
            if (input.type === 'password') {
                input.type = 'text';
                eyeIcon.classList.add('hidden');
                eyeSlashIcon.classList.remove('hidden');
            } else {
                input.type = 'password';
                eyeIcon.classList.remove('hidden');
                eyeSlashIcon.classList.add('hidden');
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const target = current === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', target);
            localStorage.setItem('theme', target);
        }

        function toggleRTL() {
            const html = document.documentElement;
            const current = html.getAttribute('dir');
            const target = current === 'ltr' ? 'rtl' : 'ltr';
            html.setAttribute('dir', target);
            localStorage.setItem('dir', target);
        }

        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
        document.documentElement.setAttribute('dir', localStorage.getItem('dir') || 'ltr');
    </script>
</body>

</html>
